# lmao
name: build

on:
  workflow_dispatch

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        # who the hell is casting hexes on a mac?
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: get rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal
          override: true

      - name: build everythin
        run: cargo build --release

      - name: upload
        uses: actions/upload-artifact@v3
        with:
          name: encoder-${{ matrix.os }}
          path: target/release/encoder*