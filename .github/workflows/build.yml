name: build

on:
  workflow_dispatch

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        # who the hell is casting hexes on a mac?
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v6

      - name: get rust
        uses: dtolnay/rust-toolchain@stable

      - name: build everythin
        run: cargo build --release

      - name: upload (linux/mac)
        if: matrix.os != 'windows-latest'
        uses: actions/upload-artifact@v6
        with:
          name: encoder-${{ matrix.os }}
          path: |
            target/release/encoder
            need/
            examples/
            README.md
      
      - name: upload (windows)
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v6
        with:
          name: encoder-${{ matrix.os }}
          path: |
            target/release/encoder.exe
            need/
            examples/
            README.md